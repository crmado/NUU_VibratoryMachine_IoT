[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Serial 監視器 ─────────────────────────────
monitor_speed = 115200

; ── 上傳速度（可依環境調整）──────────────────
upload_speed  = 921600

; ── 分區表：使用 no_ota 分區以獲得最大空間 ───
board_build.partitions = no_ota.csv

; ── 函式庫相依（如需 mDNS 可取消下面的註解）──
; lib_deps =
;   ESPmDNS
